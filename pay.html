<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1557a6" />
    <title>Pay Gen Alpha Cricket Academy</title>
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/gen-alpha-favicon-192.png" />
    <script src="./supabase-config.js"></script>
    <style>
      :root {
        --blue: #1557a6;
        --deep: #0d2f5f;
        --gold: #f7c948;
        --ink: #10223f;
        --muted: #667085;
        --line: #d9e2f2;
        --soft: #f3f7fd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        color: var(--ink);
        font-family: "Trebuchet MS", Verdana, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(247, 201, 72, 0.24), transparent 34%),
          linear-gradient(145deg, #eef5ff 0%, #ffffff 48%, #e8f1ff 100%);
      }

      .pay-card {
        width: min(430px, 100%);
        border: 1px solid rgba(21, 87, 166, 0.16);
        border-radius: 28px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(16, 34, 63, 0.16);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
      }

      .brand img {
        width: 58px;
        height: 58px;
        object-fit: contain;
      }

      .eyebrow {
        margin: 0;
        color: var(--blue);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 3px 0 0;
        color: var(--deep);
        font-size: clamp(1.35rem, 6vw, 1.9rem);
        line-height: 1.05;
      }

      .amount-box {
        margin: 18px 0;
        padding: 18px;
        border-radius: 22px;
        background: linear-gradient(135deg, #1557a6, #0d3d78);
        color: white;
      }

      .amount-label {
        margin: 0 0 5px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.82rem;
      }

      .amount {
        margin: 0;
        font-size: 2.25rem;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .detail-grid {
        display: grid;
        gap: 10px;
        margin: 18px 0;
      }

      .detail {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 13px;
        border: 1px solid var(--line);
        border-radius: 15px;
        background: var(--soft);
        font-size: 0.9rem;
      }

      .detail span:first-child {
        color: var(--muted);
      }

      .detail strong {
        text-align: right;
      }

      .pay-button {
        width: 100%;
        border: 0;
        border-radius: 18px;
        padding: 15px 18px;
        color: #0f2852;
        background: linear-gradient(135deg, var(--gold), #ffd86c);
        font-size: 1.04rem;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(247, 201, 72, 0.36);
      }

      .secondary-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
      }

      .secondary {
        border: 1px solid var(--line);
        border-radius: 15px;
        padding: 11px 12px;
        color: var(--blue);
        background: white;
        font-weight: 800;
        cursor: pointer;
      }

      .message {
        min-height: 20px;
        margin: 13px 0 0;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.4;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="pay-card">
      <div class="brand">
        <img src="./assets/gen-alpha-favicon-192.png" alt="Gen Alpha Cricket Academy" />
        <div>
          <p class="eyebrow">Gen Alpha Cricket Academy</p>
          <h1>Secure UPI Payment</h1>
        </div>
      </div>

      <section class="amount-box">
        <p class="amount-label">Amount to pay</p>
        <p class="amount" id="amountText">Rs 0</p>
      </section>

      <div class="detail-grid">
        <div class="detail">
          <span>For</span>
          <strong id="playerText">Cricket fees</strong>
        </div>
        <div class="detail">
          <span>UPI ID</span>
          <strong id="upiText">Loading...</strong>
        </div>
      </div>

      <button class="pay-button" id="payButton" type="button">Pay Now</button>
      <div class="secondary-row">
        <button class="secondary" id="copyUpiButton" type="button">Copy UPI</button>
        <button class="secondary" id="copyAmountButton" type="button">Copy Amount</button>
      </div>
      <p class="message" id="messageText">Tap Pay Now to open your UPI app.</p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const config = window.GEN_ALPHA_PAYMENT_CONFIG || {};
      const upiId = String(config.upiId || "").trim();
      const payeeName = String(config.payeeName || "Gen Alpha Cricket Academy").trim();
      const amount = Number(params.get("a") || 0);
      const player = String(params.get("name") || "Cricket fees").trim();
      const plan = String(params.get("p") || "fees").trim();
      const amountText = document.getElementById("amountText");
      const playerText = document.getElementById("playerText");
      const upiText = document.getElementById("upiText");
      const messageText = document.getElementById("messageText");

      const formatAmount = (value) =>
        Number.isFinite(value) && value > 0
          ? `Rs ${value.toLocaleString("en-IN", { maximumFractionDigits: 2 })}`
          : "Enter amount in UPI app";

      const encode = (value) => encodeURIComponent(String(value || ""));
      const note = `Gen Alpha ${plan} fee - ${player}`;
      const upiUri = [
        `pa=${upiId}`,
        `pn=${encode(payeeName)}`,
        `tn=${encode(note)}`,
        amount > 0 ? `am=${amount.toFixed(2)}` : "",
        "cu=INR",
      ]
        .filter(Boolean)
        .join("&");

      amountText.textContent = formatAmount(amount);
      playerText.textContent = player;
      upiText.textContent = upiId || "Not configured";

      const copyText = async (value, label) => {
        try {
          await navigator.clipboard.writeText(value);
          messageText.textContent = `${label} copied.`;
        } catch {
          messageText.textContent = `Unable to copy ${label.toLowerCase()}.`;
        }
      };

      document.getElementById("payButton").addEventListener("click", () => {
        if (!upiId) {
          messageText.textContent = "UPI payment is not configured. Please contact academy staff.";
          return;
        }
        messageText.textContent = "Opening your UPI app...";
        window.location.href = `upi://pay?${upiUri}`;
        window.setTimeout(() => {
          messageText.textContent = "If no UPI app opened, copy the UPI ID and pay manually.";
        }, 1600);
      });

      document.getElementById("copyUpiButton").addEventListener("click", () => copyText(upiId, "UPI ID"));
      document.getElementById("copyAmountButton").addEventListener("click", () => copyText(amount > 0 ? amount.toFixed(2) : "", "Amount"));
    </script>
  </body>
</html>
