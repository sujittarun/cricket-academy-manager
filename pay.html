<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1557a6" />
    <title>Pay Gen Alpha Cricket Academy</title>
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/gen-alpha-favicon-192.png" />
    <script src="./supabase-config.js"></script>
    <style>
      :root {
        --blue: #1557a6;
        --deep: #0d2f5f;
        --gold: #f7c948;
        --ink: #10223f;
        --muted: #667085;
        --line: #d9e2f2;
        --soft: #f3f7fd;
        --card: rgba(255, 255, 255, 0.96);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(18px, 4vw, 40px);
        color: var(--ink);
        font-family: "Trebuchet MS", Verdana, sans-serif;
        background:
          radial-gradient(circle at 18% 8%, rgba(247, 201, 72, 0.34), transparent 28%),
          radial-gradient(circle at 86% 72%, rgba(21, 87, 166, 0.18), transparent 30%),
          linear-gradient(145deg, #eef5ff 0%, #ffffff 48%, #e8f1ff 100%);
      }

      .pay-card {
        position: relative;
        width: min(620px, 100%);
        overflow: hidden;
        margin: 0 auto;
        border: 1px solid rgba(21, 87, 166, 0.14);
        border-radius: clamp(26px, 4vw, 34px);
        padding: clamp(18px, 4vw, 28px);
        background: var(--card);
        box-shadow: 0 28px 70px rgba(16, 34, 63, 0.18);
      }

      .pay-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 9px;
        background: linear-gradient(90deg, var(--blue), var(--gold));
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 6px 0 18px;
      }

      .brand img {
        width: clamp(58px, 11vw, 74px);
        height: clamp(58px, 11vw, 74px);
        object-fit: contain;
        filter: drop-shadow(0 10px 18px rgba(13, 47, 95, 0.12));
      }

      .eyebrow {
        margin: 0;
        color: var(--blue);
        font-size: clamp(0.72rem, 2vw, 0.82rem);
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 3px 0 0;
        color: var(--deep);
        font-size: clamp(1.45rem, 5vw, 2.05rem);
        line-height: 1.08;
      }

      .amount-box {
        position: relative;
        overflow: hidden;
        margin: 0 0 14px;
        padding: clamp(20px, 5vw, 30px);
        border-radius: clamp(22px, 5vw, 28px);
        background:
          radial-gradient(circle at 90% 18%, rgba(247, 201, 72, 0.32), transparent 26%),
          linear-gradient(135deg, #1557a6, #0d3d78);
        color: white;
      }

      .amount-label {
        margin: 0 0 5px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .amount {
        margin: 0;
        font-size: clamp(2.65rem, 11vw, 4.35rem);
        line-height: 0.95;
        font-weight: 900;
        letter-spacing: 0;
      }

      .plan-section {
        margin: 0 0 14px;
      }

      .plan-title {
        margin: 0 0 9px;
        color: var(--deep);
        font-size: 0.92rem;
        font-weight: 900;
      }

      .plan-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 9px;
      }

      .plan-button {
        min-height: 68px;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 10px 8px;
        background: #ffffff;
        color: var(--ink);
        cursor: pointer;
        text-align: center;
      }

      .plan-button.is-selected {
        border-color: var(--blue);
        background: #edf5ff;
        box-shadow: 0 0 0 3px rgba(21, 87, 166, 0.13);
      }

      .plan-button strong,
      .plan-button span {
        display: block;
      }

      .plan-button strong {
        font-size: 0.92rem;
        font-weight: 900;
      }

      .plan-button span {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 800;
      }

      .special-months {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-top: 10px;
        padding: 13px 14px;
        border: 1px solid rgba(21, 87, 166, 0.2);
        border-radius: 16px;
        background: #f7faff;
      }

      .special-months.is-visible {
        display: flex;
      }

      .special-months-copy strong,
      .special-months-copy span {
        display: block;
      }

      .special-months-copy strong {
        color: var(--deep);
        font-size: 0.9rem;
      }

      .special-months-copy span {
        margin-top: 3px;
        color: var(--muted);
        font-size: 0.76rem;
        line-height: 1.35;
      }

      .month-counter {
        display: grid;
        grid-template-columns: 42px 48px 42px;
        align-items: center;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: white;
      }

      .month-counter button {
        min-height: 42px;
        border: 0;
        color: var(--blue);
        background: white;
        font-size: 1.35rem;
        font-weight: 900;
        cursor: pointer;
      }

      .month-counter strong {
        text-align: center;
        font-size: 1rem;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin: 0 0 14px;
      }

      .detail {
        display: grid;
        gap: 6px;
        min-height: 78px;
        padding: 13px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--soft);
      }

      .detail span:first-child {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .detail strong {
        text-align: left;
        overflow-wrap: anywhere;
        font-size: 0.98rem;
        line-height: 1.25;
      }

      .pay-button {
        width: 100%;
        border: 0;
        min-height: 58px;
        border-radius: 19px;
        padding: 0 20px;
        color: #0f2852;
        background: linear-gradient(135deg, var(--gold), #ffd86c);
        font-size: clamp(1.08rem, 3.8vw, 1.22rem);
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(247, 201, 72, 0.36);
      }

      .secondary-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 11px;
      }

      .upi-options {
        display: none;
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #ffffff;
      }

      .upi-options.is-visible {
        display: block;
      }

      .upi-options-title {
        margin: 0 0 10px;
        color: var(--deep);
        font-size: 0.9rem;
        font-weight: 900;
        text-align: center;
      }

      .upi-app-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }

      .upi-app-button {
        border: 1px solid var(--line);
        border-radius: 14px;
        min-height: 46px;
        padding: 10px 12px;
        color: var(--ink);
        background: var(--soft);
        font-size: 0.9rem;
        font-weight: 900;
        cursor: pointer;
      }

      .upi-options-note {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.35;
        text-align: center;
      }

      .secondary {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        color: var(--blue);
        background: white;
        font-size: 0.88rem;
        font-weight: 800;
        cursor: pointer;
      }

      .message {
        min-height: 19px;
        margin: 13px 0 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.4;
        text-align: center;
      }

      @media (max-width: 560px) {
        body {
          align-items: start;
          padding: 16px;
        }

        .pay-card {
          width: 100%;
          border-radius: 28px;
        }

        .detail-grid {
          grid-template-columns: 1fr;
        }

        .plan-grid {
          grid-template-columns: 1fr;
        }

        .special-months {
          align-items: stretch;
          flex-direction: column;
        }

        .month-counter {
          align-self: stretch;
          grid-template-columns: 1fr 64px 1fr;
        }

        .brand {
          align-items: flex-start;
        }

        .secondary-row {
          grid-template-columns: 1fr;
        }

        .upi-app-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="pay-card">
      <div class="brand">
        <img src="./assets/gen-alpha-favicon-192.png" alt="Gen Alpha Cricket Academy" />
        <div>
          <p class="eyebrow">Gen Alpha Cricket Academy</p>
          <h1>Secure UPI Payment</h1>
        </div>
      </div>

      <section class="amount-box">
        <p class="amount-label">Amount to pay</p>
        <p class="amount" id="amountText">Rs 0</p>
      </section>

      <section class="plan-section" id="planSection">
        <p class="plan-title">Choose payment period</p>
        <div class="plan-grid" id="planGrid"></div>
        <div class="special-months" id="specialMonthsControl">
          <div class="special-months-copy">
            <strong>Special Training duration</strong>
            <span id="specialDiscountText">₹10,000 per month</span>
          </div>
          <div class="month-counter" aria-label="Special Training months">
            <button id="decreaseSpecialMonths" type="button" aria-label="Decrease months">−</button>
            <strong id="specialMonthsText">1</strong>
            <button id="increaseSpecialMonths" type="button" aria-label="Increase months">+</button>
          </div>
        </div>
      </section>

      <div class="detail-grid">
        <div class="detail">
          <span>For</span>
          <strong id="playerText">Cricket fees</strong>
        </div>
        <div class="detail">
          <span>UPI ID</span>
          <strong id="upiText">Loading...</strong>
        </div>
      </div>

      <button class="pay-button" id="payButton" type="button">Pay Now</button>
      <section class="upi-options" id="upiOptions" aria-live="polite">
        <p class="upi-options-title">Choose your UPI app</p>
        <div class="upi-app-grid">
          <button class="upi-app-button" type="button" data-upi-app="phonepe">PhonePe</button>
          <button class="upi-app-button" type="button" data-upi-app="gpay">Google Pay</button>
          <button class="upi-app-button" type="button" data-upi-app="paytm">Paytm</button>
          <button class="upi-app-button" type="button" data-upi-app="bhim">BHIM</button>
          <button class="upi-app-button" type="button" data-upi-app="generic">Other UPI app</button>
        </div>
        <p class="upi-options-note">If an app does not open, copy the UPI ID and amount below.</p>
      </section>
      <div class="secondary-row">
        <button class="secondary" id="copyUpiButton" type="button">Copy UPI</button>
        <button class="secondary" id="copyAmountButton" type="button">Copy Amount</button>
      </div>
      <p class="message" id="messageText">Tap Pay Now to open your UPI app.</p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const config = window.GEN_ALPHA_PAYMENT_CONFIG || {};
      const supabaseConfig = window.GEN_ALPHA_SUPABASE_CONFIG || {};
      const upiId = String(config.upiId || "").trim();
      const payeeName = String(config.payeeName || "Gen Alpha Cricket Academy").trim();
      const amount = Number(params.get("a") || 0);
      const player = String(params.get("name") || "Cricket fees").trim();
      const plan = String(params.get("p") || "fees").trim();
      const reminderEventId = String(params.get("e") || "").trim();
      const requestedInitialMonths = Number(params.get("m") || 1);
      const initialMonths = Number.isFinite(requestedInitialMonths)
        ? Math.min(36, Math.max(1, Math.floor(requestedInitialMonths)))
        : 1;
      const amountText = document.getElementById("amountText");
      const playerText = document.getElementById("playerText");
      const upiText = document.getElementById("upiText");
      const messageText = document.getElementById("messageText");
      const upiOptions = document.getElementById("upiOptions");
      const planGrid = document.getElementById("planGrid");
      const planSection = document.getElementById("planSection");
      const specialMonthsControl = document.getElementById("specialMonthsControl");
      const specialMonthsText = document.getElementById("specialMonthsText");
      const specialDiscountText = document.getElementById("specialDiscountText");
      const basePlanOptions = [
        { id: "monthly", label: "1 Month", months: 1, amount: 3500 },
        { id: "quarterly", label: "3 Months", months: 3, amount: 9975 },
        { id: "halfyearly", label: "6 Months", months: 6, amount: 18900 },
        { id: "special", label: "Special Training", months: 1, amount: 10000, customMonths: true, minMonths: 1, maxMonths: 36 },
      ];
      const planLabelToId = {
        "1 month": "monthly",
        monthly: "monthly",
        "3 months": "quarterly",
        quarterly: "quarterly",
        "6 months": "halfyearly",
        halfyearly: "halfyearly",
        special: "special",
        "special training": "special",
      };
      let paymentOptions = basePlanOptions;
      let selectedPlanId = planLabelToId[plan.toLowerCase()] || "";
      let selectedAmount = Number.isFinite(amount) && amount > 0 ? amount : 0;
      let selectedPlanLabel = plan || "fees";
      let playerName = player;
      let selectedMonths = initialMonths;

      const specialDiscountRate = (months) => months >= 6 ? 0.1 : (months >= 3 ? 0.05 : 0);
      const specialAmount = (months) => Math.round(10000 * months * (1 - specialDiscountRate(months)));
      const clampSpecialMonths = (months) => Math.min(36, Math.max(1, Math.floor(Number(months || 1))));

      const formatAmount = (value) =>
        Number.isFinite(value) && value > 0
          ? `Rs ${value.toLocaleString("en-IN", { maximumFractionDigits: 2 })}`
          : "Enter amount in UPI app";

      const rupees = (value) =>
        Number(value || 0).toLocaleString("en-IN", { maximumFractionDigits: 0 });

      const encode = (value) => encodeURIComponent(String(value || ""));

      const currentOption = () =>
        paymentOptions.find((option) => option.id === selectedPlanId) ||
        paymentOptions[0];

      const currentAmount = () => {
        const option = currentOption();
        return selectedAmount || Number(option?.amount || 0);
      };

      const currentPlanLabel = () => {
        const option = currentOption();
        if (option?.id === "special") {
          return `Special Training (${selectedMonths} month${selectedMonths === 1 ? "" : "s"})`;
        }
        return option?.label || selectedPlanLabel || "fees";
      };

      const renderSpecialMonths = () => {
        const isSpecial = selectedPlanId === "special";
        specialMonthsControl.classList.toggle("is-visible", isSpecial);
        if (!isSpecial) return;
        specialMonthsText.textContent = String(selectedMonths);
        const discount = specialDiscountRate(selectedMonths);
        specialDiscountText.textContent = discount > 0
          ? `₹10,000/month • ${Math.round(discount * 100)}% multi-month discount applied`
          : "₹10,000 per month";
      };

      const buildUpiUri = () => {
        const amountDue = currentAmount();
        const note = `Gen Alpha ${currentPlanLabel()} fee - ${playerName}`;
        return [
          `pa=${upiId}`,
          `pn=${encode(payeeName)}`,
          `tn=${encode(note)}`,
          amountDue > 0 ? `am=${amountDue.toFixed(2)}` : "",
          "cu=INR",
        ]
          .filter(Boolean)
          .join("&");
      };

      const buildUpiLinks = () => {
        const upiUri = buildUpiUri();
        return {
          generic: `upi://pay?${upiUri}`,
          phonepe: `phonepe://pay?${upiUri}`,
          gpay: `gpay://upi/pay?${upiUri}`,
          paytm: `paytmmp://pay?${upiUri}`,
          bhim: `bhim://upi/pay?${upiUri}`,
        };
      };

      const renderPlanOptions = () => {
        if (!paymentOptions.length) {
          planSection.style.display = "none";
          return;
        }
        planSection.style.display = "";
        planGrid.innerHTML = paymentOptions.map((option) => `
          <button class="plan-button${option.id === selectedPlanId ? " is-selected" : ""}" type="button" data-plan-id="${option.id}">
            <strong>${option.label}</strong>
            <span>${option.id === "special" ? `${option.months} mo • ` : ""}Rs ${rupees(option.amount)}</span>
          </button>
        `).join("");
        renderSpecialMonths();
      };

      const selectPlan = (planId, requestedMonths = 0, amountOverride = 0) => {
        const option = paymentOptions.find((item) => item.id === planId) || paymentOptions[0];
        if (!option) return;
        selectedPlanId = option.id;
        selectedPlanLabel = option.label;
        if (option.id === "special") {
          selectedMonths = clampSpecialMonths(requestedMonths || selectedMonths || option.months || 1);
          option.months = selectedMonths;
          option.amount = specialAmount(selectedMonths);
          selectedAmount = option.amount;
        } else {
          selectedMonths = Number(option.months || 0);
          selectedAmount = Number(amountOverride || option.amount || 0);
        }
        amountText.textContent = formatAmount(selectedAmount);
        renderPlanOptions();
      };

      amountText.textContent = formatAmount(selectedAmount || currentAmount());
      playerText.textContent = playerName;
      upiText.textContent = upiId || "Not configured";

      const isAppleTouchDevice = () =>
        /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      if (!selectedPlanId) {
        selectPlan("monthly");
      } else {
        selectPlan(selectedPlanId, initialMonths, selectedAmount);
      }

      const copyText = async (value, label) => {
        try {
          await navigator.clipboard.writeText(value);
          messageText.textContent = `${label} copied.`;
        } catch {
          messageText.textContent = `Unable to copy ${label.toLowerCase()}.`;
        }
      };

      const notifyPaymentAttempt = async () => {
        if (!reminderEventId || !supabaseConfig.url) {
          return;
        }

        const notifyKey = `gen-alpha-payment-attempt-${reminderEventId}-${selectedPlanId}-${selectedMonths}`;
        if (sessionStorage.getItem(notifyKey)) {
          return;
        }

        const endpoint = `${String(supabaseConfig.url).replace(/\/+$/, "")}/functions/v1/whatsapp-reminder`;
        const request = fetch(endpoint, {
          method: "POST",
          keepalive: true,
          headers: {
            "Content-Type": "application/json",
            ...(supabaseConfig.anonKey ? { apikey: supabaseConfig.anonKey } : {}),
          },
          body: JSON.stringify({
            action: "payment_attempted",
            eventId: reminderEventId,
            selectedPlan: selectedPlanId,
            selectedMonths,
          }),
        }).then((response) => {
          if (response.ok) {
            sessionStorage.setItem(notifyKey, "1");
          }
        });

        await Promise.race([
          request.catch(() => {}),
          new Promise((resolve) => window.setTimeout(resolve, 700)),
        ]);
      };

      const applyRemotePaymentOptions = (payload) => {
        if (!payload?.success) return;
        if (payload.playerName) {
          playerName = String(payload.playerName);
          playerText.textContent = playerName;
        }
        if (Array.isArray(payload.options) && payload.options.length) {
          paymentOptions = payload.options.map((option) => ({
            id: String(option.id || ""),
            label: String(option.label || ""),
            months: Number(option.months || 0),
            amount: Number(option.amount || 0),
            customMonths: Boolean(option.customMonths),
            minMonths: Number(option.minMonths || option.months || 1),
            maxMonths: Number(option.maxMonths || option.months || 36),
          })).filter((option) => option.id && option.label && option.amount > 0);
        }
        selectedAmount = 0;
        selectPlan(
          payload.defaultPlan || selectedPlanId || "monthly",
          Number(payload.selectedMonths || initialMonths),
        );
      };

      const loadPaymentOptions = async () => {
        if (!reminderEventId || !supabaseConfig.url) return;
        try {
          const endpoint = `${String(supabaseConfig.url).replace(/\/+$/, "")}/functions/v1/whatsapp-reminder`;
          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(supabaseConfig.anonKey ? { apikey: supabaseConfig.anonKey } : {}),
            },
            body: JSON.stringify({
              action: "payment_options",
              eventId: reminderEventId,
            }),
          });
          if (!response.ok) return;
          applyRemotePaymentOptions(await response.json());
        } catch {
          // The embedded query params and default plan amounts remain usable offline.
        }
      };

      const showUpiOptions = () => {
        upiOptions.classList.add("is-visible");
        messageText.textContent = "Choose your UPI app. If it does not open, copy the UPI ID and amount.";
      };

      const openUpiApp = (appName = "generic") => {
        void notifyPaymentAttempt();
        const upiLinks = buildUpiLinks();
        const targetUrl = upiLinks[appName] || upiLinks.generic;
        messageText.textContent = "Opening your UPI app...";
        window.location.href = targetUrl;
        window.setTimeout(() => {
          messageText.textContent = 'After payment, reply "Paid" on WhatsApp or send the payment screenshot.';
        }, 1600);
      };

      document.getElementById("payButton").addEventListener("click", () => {
        if (!upiId) {
          messageText.textContent = "UPI payment is not configured. Please contact academy staff.";
          return;
        }
        if (isAppleTouchDevice()) {
          showUpiOptions();
          return;
        }
        openUpiApp("generic");
      });

      document.querySelectorAll("[data-upi-app]").forEach((button) => {
        button.addEventListener("click", () => {
          if (!upiId) {
            messageText.textContent = "UPI payment is not configured. Please contact academy staff.";
            return;
          }
          openUpiApp(button.dataset.upiApp || "generic");
        });
      });

      planGrid.addEventListener("click", (event) => {
        const button = event.target.closest("[data-plan-id]");
        if (!button) return;
        selectPlan(button.dataset.planId);
      });

      document.getElementById("decreaseSpecialMonths").addEventListener("click", () => {
        selectPlan("special", selectedMonths - 1);
      });
      document.getElementById("increaseSpecialMonths").addEventListener("click", () => {
        selectPlan("special", selectedMonths + 1);
      });

      document.getElementById("copyUpiButton").addEventListener("click", () => copyText(upiId, "UPI ID"));
      document.getElementById("copyAmountButton").addEventListener("click", () => copyText(currentAmount() > 0 ? currentAmount().toFixed(2) : "", "Amount"));
      void loadPaymentOptions();
    </script>
  </body>
</html>
